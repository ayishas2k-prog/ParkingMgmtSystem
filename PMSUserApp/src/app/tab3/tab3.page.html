<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Notifications</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="loadNotifications()">
        <ion-icon name="refresh-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <ion-list *ngIf="notifications.length > 0">
    <ion-item-sliding *ngFor="let notification of notifications">
      <ion-item lines="full" class="notification-item">
        <ion-icon name="information-circle-outline" slot="start" color="primary"></ion-icon>
        <ion-label>
          <div class="notification-header">
            <h3>{{ notification.VehicleNumber }}</h3>
            <span class="time">{{ notification.CreatedDateTime | date:'shortTime' }}</span>
          </div>
          <p class="message">{{ notification.Message }}</p>
          <p class="date">{{ notification.CreatedDateTime | date:'mediumDate' }}</p>
        </ion-label>
      </ion-item>

      <ion-item-options side="end">
        <ion-item-option color="success" (click)="markAsRead(notification.id)">
          <ion-icon name="checkmark-done-outline" slot="icon-only"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
  </ion-list>

  <div *ngIf="notifications.length === 0" class="ion-text-center ion-margin-top no-data">
    <ion-icon name="notifications-off-outline" size="large" color="medium"></ion-icon>
    <p>All caught up! No new notifications.</p>
  </div>
</ion-content>

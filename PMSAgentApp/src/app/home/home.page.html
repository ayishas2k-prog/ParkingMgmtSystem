<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Agent Dashboard
    </ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()">
        <ion-icon slot="icon-only" name="log-out-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Agent Dashboard</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-grid>
    <ion-row>
      <ion-col size-xs="6" size-sm="6" size-md="4">
        <ion-card class="dashboard-card" routerLink="/vehicle-scanning">
          <ion-icon name="scan-outline"></ion-icon>
          <ion-card-header>
            <ion-card-title>Vehicle Scanning</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
      <ion-col size-xs="6" size-sm="6" size-md="4">
        <ion-card class="dashboard-card" routerLink="/find-vehicle">
          <ion-icon name="search-outline"></ion-icon>
          <ion-card-header>
            <ion-card-title>Find Vehicle</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
      <ion-col size-xs="6" size-sm="6" size-md="4">
        <ion-card class="dashboard-card" routerLink="/locations">
          <ion-icon name="location-outline"></ion-icon>
          <ion-card-header>
            <ion-card-title>Locations</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
      <ion-col size-xs="6" size-sm="6" size-md="4">
        <ion-card class="dashboard-card" routerLink="/parking-slots">
          <ion-icon name="car-sport-outline"></ion-icon>
          <ion-card-header>
            <ion-card-title>Parking Slots</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
      <ion-col size-xs="6" size-sm="6" size-md="4">
        <ion-card class="dashboard-card" routerLink="/cost">
          <ion-icon name="cash-outline"></ion-icon>
          <ion-card-header>
            <ion-card-title>Cost Management</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
      <ion-col size-xs="6" size-sm="6" size-md="4">
        <ion-card class="dashboard-card" routerLink="/gates">
          <ion-icon name="server-outline"></ion-icon>
          <ion-card-header>
            <ion-card-title>Gates</ion-card-title>
          </ion-card-header>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>

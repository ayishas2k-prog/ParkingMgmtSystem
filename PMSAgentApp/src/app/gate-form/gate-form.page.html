<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/gates"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEditMode ? 'Edit' : 'Add' }} Gate</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ isEditMode ? 'Edit' : 'Add' }} Gate</ion-title>
    </ion-toolbar>
  </ion-header>

  <form (ngSubmit)="saveGate()" #gateForm="ngForm">
    <ion-list>
      <ion-item>
        <ion-input label="Gate Number/Name" labelPlacement="floating" required [(ngModel)]="gate.GateName" name="gateName"></ion-input>
      </ion-item>
      <ion-item>
        <ion-select label="Gate Type" [(ngModel)]="gate.GateType" name="gateType" required>
          <ion-select-option value="IN">IN</ion-select-option>
          <ion-select-option value="OUT">OUT</ion-select-option>
          <ion-select-option value="BOTH">BOTH</ion-select-option>
        </ion-select>
      </ion-item>
      <ion-item>
        <ion-toggle [(ngModel)]="gate.IsActive" name="isActive">Is Active</ion-toggle>
      </ion-item>
    </ion-list>
    <ion-button expand="block" type="submit" [disabled]="gateForm.invalid">Save Gate</ion-button>
  </form>
</ion-content>

<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home"></ion-back-button>
    </ion-buttons>
    <ion-title>Parking Slots</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Parking Slots</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list>
    <ion-item *ngFor="let slot of parkingSlots" (click)="editParkingSlot(slot)">
      <ion-label>
        <h2>{{ slot.SlotNumber }}</h2>
        <p>Location: {{ slot.SlotLocation }} - Floor: {{ slot.Floor }}</p>
        <p>Waymarkings: {{ slot.SlotLocationWayMarkings }}</p>
      </ion-label>
      <ion-icon name="create-outline" slot="end"></ion-icon>
    </ion-item>
  </ion-list>

  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="addParkingSlot()">
      <ion-icon name="add"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>

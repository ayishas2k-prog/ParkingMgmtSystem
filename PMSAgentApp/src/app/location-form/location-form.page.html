<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/locations"></ion-back-button>
    </ion-buttons>
    <ion-title>{{ isEditMode ? 'Edit' : 'Add' }} Location</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">{{ isEditMode ? 'Edit' : 'Add' }} Location</ion-title>
    </ion-toolbar>
  </ion-header>

  <form (ngSubmit)="saveLocation()" #locationForm="ngForm">
    <ion-list>
      <ion-item>
        <ion-input label="Location Name" labelPlacement="floating" required [(ngModel)]="location.Location" name="locationName"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Way Markings" labelPlacement="floating" [(ngModel)]="location.LocationWayMarkings" name="wayMarkings"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Premises" labelPlacement="floating" [(ngModel)]="location.LocationPremises" name="premises"></ion-input>
      </ion-item>
      <ion-item>
        <ion-input label="Prefix Character" labelPlacement="floating" required maxlength="1" [(ngModel)]="location.LocationPrefixCharacter" name="prefixCharacter"></ion-input>
      </ion-item>
    </ion-list>
    <ion-button expand="block" type="submit" [disabled]="locationForm.invalid">Save Location</ion-button>
  </form>
</ion-content>
